{% extends 'base.html' %}

{% block title %}Password Reset{% endblock %}

{% block content %}
    <div class="form-wrapper">
        <h2>Password Reset</h2>
        <form class="form-group" method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Reset</button>
        </form>
    </div>
{% endblock %}
